---
spring:
  config:
    import: classpath:application-common.yml
---

spring:
  application:
    name: spring-ai-mcp-client
  ai:
    memory:
      redis:
        host: ${spring_ai_memory_redis_host:127.0.0.1}
    mcp:
      client:
        toolcallback:
          enabled: true
        sse:
          connections:
            example:
              url: ${spring_ai_mcp_client_sse_connections_example_url:http://localhost:8000/mcp-server/demo}
    openai:
      api-key: ${spring_ai_openai_api_key:noUse}
      base-url: ${spring_ai_openai_base_url:http://localhost:8000}
      chat:
        completions-path: ${spring_ai_openai_chat_completions_path:/llm/gemini}
        options:
          model: ${spring_ai_openai_chat_options_model:gemini-1.5-flash}

server:
  port: 8987

management:
  metrics:
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true
    tags:
      application: ${spring.application.name}
  endpoint:
    health:
      probes:
        enabled: true
  observations:
    annotations:
      enabled: true
  endpoints:
    web:
      exposure:
        include: ${management_endpoints_web_exposure_include:health,prometheus}
